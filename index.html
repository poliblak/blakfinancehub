<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BlakFinanceHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --gray-900:#111113;--gray-800:#222226;--gray-700:#343438;--gray-600:#45454B;--gray-500:#56565E;
  --gray-400:#82828C;--gray-300:#A1A1A9;--gray-200:#D0D0D4;--gray-100:#EFEFF1;
  --black:#000000;--white:#FFFFFF;--orange:#F9970C;--orange-200:#FEF4E1;
  --green:#297B32;--green-200:#E5FAE6;--red:#E83838;--red-200:#FFEBEB;
  --radius:24px;--radius-sm:18px;--shadow:0 24px 80px rgba(0,0,0,.28);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:var(--black);font-family:Inter,system-ui,sans-serif;color:var(--gray-100)}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.app{min-height:100vh;display:grid;grid-template-columns:228px 1fr;background:
  radial-gradient(circle at 80% 0%,rgba(255,255,255,.07),transparent 31%),
  linear-gradient(145deg,var(--black),var(--gray-900) 54%,var(--black));}
.side{padding:28px 18px;display:flex;flex-direction:column;gap:28px;background:linear-gradient(180deg,rgba(34,34,38,.96),rgba(17,17,19,.98))}
.brand{display:flex;align-items:center;gap:12px;font-weight:800;font-size:19px}
.brand-mark{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(145deg,var(--white),var(--gray-400));color:var(--black);font-weight:900}
.nav{display:grid;gap:8px}
.nav button,.side-bottom button{height:48px;border:0;border-radius:999px;background:transparent;color:var(--gray-200);display:flex;align-items:center;gap:12px;padding:0 16px;font-weight:700;text-align:left}
.nav button.active{background:linear-gradient(135deg,var(--white),var(--gray-200));color:var(--black)}
.side-bottom{margin-top:auto;display:grid;gap:8px}
.main{padding:30px 32px 42px;overflow:hidden}
.top{display:flex;justify-content:space-between;gap:20px;align-items:center;margin-bottom:24px}
.title h1{margin:0;font-size:32px;letter-spacing:-.04em;color:var(--white)}
.title p{margin:5px 0 0;color:var(--gray-300)}
.top-actions{display:flex;align-items:center;gap:12px}
.round{width:48px;height:48px;border:0;border-radius:50%;background:var(--gray-800);color:var(--white);display:grid;place-items:center}
.profile{height:52px;border:0;border-radius:999px;background:var(--gray-800);color:var(--white);display:flex;align-items:center;gap:10px;padding:0 16px 0 6px}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--gray-100),var(--gray-500));color:var(--black);display:grid;place-items:center;font-weight:800}
.btn{border:0;border-radius:999px;height:46px;padding:0 18px;font-weight:800;color:var(--black);background:linear-gradient(135deg,var(--white),var(--gray-200))}
.btn.dark{background:var(--gray-800);color:var(--white)}
.btn.warn{background:var(--orange);color:var(--black)}
.btn.danger{background:var(--red);color:var(--white)}
.btn.success{background:var(--green);color:var(--white)}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px}
.chip,.field{height:44px;border:0;border-radius:999px;background:var(--gray-800);color:var(--gray-100);padding:0 15px}
.field{min-width:130px}
.page{display:none}.page.active{display:block}
.grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
.grid-2{display:grid;grid-template-columns:2fr 1fr;gap:16px}
.grid{display:grid;gap:16px}
.card{background:linear-gradient(180deg,var(--gray-800),var(--gray-900));border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;min-width:0}
.metric{min-height:152px;position:relative;overflow:hidden}
.metric h3,.card h3{margin:0;color:var(--gray-100);font-size:16px}
.metric .value{font-size:30px;font-weight:850;letter-spacing:-.04em;margin-top:22px}
.muted{color:var(--gray-300);font-size:13px}
.trend{display:inline-flex;align-items:center;gap:5px;margin-top:14px;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:800}
.trend.pos{background:var(--green-200);color:var(--green)}
.trend.neg{background:var(--red-200);color:var(--red)}
.arrow{position:absolute;right:18px;top:18px;width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:var(--gray-700);color:var(--white)}
.chart{height:250px;position:relative}
.bar-chart{height:200px;display:flex;gap:22px;align-items:end;padding:18px 6px 28px}
.bar-month{flex:1;display:flex;align-items:end;justify-content:center;gap:7px;position:relative;height:100%}
.bar{width:18px;border-radius:999px 999px 8px 8px;min-height:8px;background:var(--gray-500);transition:.18s transform,.18s filter}
.bar.income{background:linear-gradient(180deg,var(--green),var(--gray-600))}
.bar.expense{background:linear-gradient(180deg,var(--gray-300),var(--gray-600))}
.bar:hover,.donut-seg:hover,.goal-card:hover,.budget-card:hover{transform:translateY(-3px);filter:brightness(1.12)}
.legend{display:flex;gap:14px;align-items:center;flex-wrap:wrap;color:var(--gray-300);font-size:12px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;background:var(--gray-300)}
.dot.green{background:var(--green)}.dot.red{background:var(--red)}.dot.warn{background:var(--orange)}
.donut-wrap{display:grid;grid-template-columns:1fr 1.1fr;gap:14px;align-items:center}
.donut{width:190px;height:190px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--gray-300) 0 80deg,var(--gray-600) 80deg 160deg,var(--gray-500) 160deg 235deg,var(--gray-700) 235deg 360deg)}
.donut-inner{width:112px;height:112px;border-radius:50%;background:var(--gray-900);display:grid;place-items:center;text-align:center}
.goal-list{display:grid;gap:13px}
.progress{height:16px;background:var(--gray-700);border-radius:999px;overflow:hidden}
.progress i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--white),var(--gray-400))}
.table-wrap{overflow:auto}
table{width:100%;border-collapse:separate;border-spacing:0 10px}
th{color:var(--gray-300);font-size:12px;text-align:left;padding:0 14px}
td{background:var(--gray-800);padding:15px 14px;color:var(--gray-100)}
td:first-child{border-radius:18px 0 0 18px}td:last-child{border-radius:0 18px 18px 0}
.amount.pos{color:var(--green)}.amount.neg{color:var(--red)}
.section-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}
.goal-grid,.budget-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
.goal-card,.budget-card{background:linear-gradient(180deg,var(--gray-800),var(--gray-900));border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);transition:.18s}
.goal-card h3,.budget-card h3{margin:0 0 10px}
.big{font-size:28px;font-weight:850;letter-spacing:-.04em}
.split{display:grid;grid-template-columns:1fr 1.6fr;gap:16px}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.status{background:var(--gray-800);border-radius:999px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.budget-layout{display:grid;grid-template-columns:1.8fr .9fr;gap:16px}
.mini-list{display:grid;gap:10px}
.mini-row{display:flex;justify-content:space-between;gap:12px;align-items:center;background:var(--gray-800);border-radius:18px;padding:12px}
.pill{border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800}
.pill.ok{background:var(--green-200);color:var(--green)}.pill.warn{background:var(--orange-200);color:var(--orange)}.pill.bad{background:var(--red-200);color:var(--red)}
.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.72);z-index:20;padding:18px}
.modal.open{display:flex}
.panel{width:min(560px,100%);background:var(--gray-900);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
.form-grid{display:grid;gap:12px}
.form-grid input,.form-grid select,.form-grid textarea{width:100%;background:var(--gray-800);color:var(--white);border:0;border-radius:18px;padding:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}
.auth{position:fixed;inset:0;display:none;z-index:30;align-items:center;justify-content:center;background:rgba(0,0,0,.78);padding:18px}
.auth.open{display:flex}
.auth-card{width:min(860px,100%);display:grid;grid-template-columns:1fr 1fr;background:var(--gray-900);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.auth-copy{padding:44px;background:linear-gradient(135deg,var(--gray-800),var(--black))}
.auth-copy h2{font-size:42px;letter-spacing:-.06em;margin:0 0 12px}
.auth-form{padding:44px;display:grid;gap:12px;align-content:center}.auth-form input{background:var(--gray-800);border:0;border-radius:18px;padding:14px;color:var(--white)}
.toast{position:fixed;right:22px;bottom:22px;background:var(--gray-100);color:var(--black);border-radius:18px;padding:14px 18px;z-index:40;display:none}
.tooltip{position:fixed;z-index:50;pointer-events:none;background:var(--gray-100);color:var(--black);border-radius:12px;padding:8px 10px;font-size:12px;font-weight:800;display:none}
@media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-2,.split,.budget-layout{grid-template-columns:1fr}.goal-grid,.budget-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:760px){.app{grid-template-columns:1fr}.side{position:sticky;top:0;z-index:10;padding:14px;gap:12px}.nav{grid-template-columns:repeat(5,1fr);overflow:auto}.nav button{justify-content:center;padding:0 12px;font-size:0}.nav button span:first-child{font-size:18px}.side-bottom{display:none}.main{padding:18px 14px}.top{align-items:flex-start}.top-actions{display:none}.grid-4{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.metric{min-height:132px;padding:16px}.metric .value{font-size:22px}.goal-grid,.budget-grid{grid-template-columns:1fr}.auth-card{grid-template-columns:1fr}.auth-copy{display:none}.form-row{grid-template-columns:1fr}.bar-chart{gap:8px}.bar{width:12px}}

/* SoDEX-style trading console aesthetic override */
:root{
  --gray-900:#111113;
  --gray-800:#151516;
  --gray-700:#202123;
  --gray-600:#343438;
  --gray-500:#56565E;
  --gray-400:#82828C;
  --gray-300:#A1A1A9;
  --gray-200:#D0D0D4;
  --gray-100:#EFEFF1;
  --black:#000000;
  --white:#FFFFFF;
  --orange:#F9970C;
  --orange-200:#FEF4E1;
  --green:#297B32;
  --green-200:#E5FAE6;
  --red:#E83838;
  --red-200:#FFEBEB;
  --radius:14px;
  --radius-sm:10px;
  --shadow:none;
}
*{
  scrollbar-width:thin;
  scrollbar-color:#343438 #111113;
}
html,body{
  background:#080809;
  color:var(--gray-100);
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px) 0 0/56px 56px,
    linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px) 0 0/56px 56px,
    radial-gradient(circle at 50% -18%,rgba(249,151,12,.16),transparent 32%),
    #080809;
  z-index:0;
}
.app{
  position:relative;
  z-index:1;
  min-height:100vh;
  display:block;
  padding:0;
  background:transparent;
}
.side{
  position:sticky;
  top:0;
  z-index:12;
  min-height:0;
  height:72px;
  margin:0;
  padding:0 24px;
  display:grid;
  grid-template-columns:auto minmax(0,1fr) auto;
  align-items:center;
  gap:22px;
  background:rgba(11,11,12,.96);
  border-radius:0;
  box-shadow:0 1px 0 rgba(255,255,255,.075);
  backdrop-filter:blur(14px);
}
.brand{
  min-height:0;
  padding:0;
  display:flex;
  align-items:center;
  gap:10px;
  font-size:22px;
  font-weight:900;
  letter-spacing:-.04em;
  color:var(--white);
}
.brand span{
  display:inline;
}
.brand span::before{
  content:'Blak';
}
.brand span{
  font-size:0;
}
.brand span::before{
  font-size:22px;
}
.brand-mark{
  width:34px;
  height:34px;
  border-radius:8px;
  display:grid;
  place-items:center;
  color:#080809;
  background:
    linear-gradient(135deg,var(--white) 0 45%,var(--orange) 46% 100%);
  box-shadow:none;
  font-size:16px;
  font-weight:950;
}
.brand-mark::after{
  content:'';
  width:12px;
  height:12px;
  border-radius:3px;
  background:#080809;
  transform:rotate(45deg);
}
.brand-mark{
  font-size:0;
}
.nav{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
  width:100%;
  min-width:0;
  overflow:auto;
}
.nav button,
.side-bottom button{
  width:auto;
  height:38px;
  margin:0;
  padding:0 12px;
  justify-content:center;
  gap:8px;
  border-radius:10px;
  background:transparent;
  color:var(--gray-300);
  font-size:13px;
  font-weight:750;
  letter-spacing:-.01em;
  white-space:nowrap;
  box-shadow:none;
}
.nav button span:first-child{
  display:none;
}
.nav button span:last-child{
  display:inline;
  font-size:13px;
}
.nav button:hover{
  background:#171719;
  color:var(--white);
}
.nav button.active{
  color:var(--black);
  background:var(--white);
  box-shadow:none;
}
.side-bottom{
  margin:0;
  display:flex;
  align-items:center;
  gap:8px;
}
.side-bottom button{
  height:38px;
  border-radius:9px;
  background:#141416;
  color:var(--gray-200);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.07);
}
#syncState{
  color:#85D98B;
}
#logoutBtn{
  background:var(--orange);
  color:#111113;
  box-shadow:none;
}
#syncState::before,#logoutBtn::before{
  content:'';
}
.main{
  width:min(1240px,calc(100vw - 32px));
  margin:0 auto;
  padding:18px 0 42px;
  overflow:visible;
}
.main::before{
  content:'Welcome to BlakFinanceHub. Track your money, budgets and goals in realtime.';

  padding:0 18px;

}
.top{

}

}

}
.top-actions{

}

}
.btn,

.btn{

}
.btn.dark{

<body>
<div class="auth" id="authGate">
  <div class="auth-card">
    <div class="auth-copy"><div class="brand"><div class="brand-mark">B</div>BlakFinanceHub</div><h2>Manage your money in realtime.</h2><p class="muted">Tus transacciones, metas y presupuestos se sincronizan con Supabase desde cualquier dispositivo.</p></div>
    <form class="auth-form" id="authForm"><h2>Iniciar sesion</h2><input id="authEmail" type="email" placeholder="Email" required><input id="authPassword" type="password" placeholder="Password" required><button class="btn" type="submit">Entrar</button><button class="btn dark" type="button" id="signupBtn">Crear cuenta</button><p class="muted" id="authStatus"></p></form>
  </div>
</div>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="brand-mark">F</div><span>FinSet</span></div>
    <nav class="nav" id="nav">
      <button data-page="dashboard" class="active"><span>D</span><span>Dashboard</span></button>
      <button data-page="transactions"><span>T</span><span>Transactions</span></button>
      <button data-page="goals"><span>G</span><span>Goals</span></button>
      <button data-page="analytics"><span>A</span><span>Analytics</span></button>
      <button data-page="budget"><span>B</span><span>Budget</span></button>
    </nav>
    <div class="side-bottom"><button class="dark" id="syncState">Realtime</button><button id="logoutBtn">Log out</button></div>
  </aside>
  <main class="main">
    <div class="top"><div class="title"><h1 id="pageTitle">Welcome back</h1><p id="pageSub">It is the best time to manage your finances</p></div><div class="top-actions"><button class="round">S</button><button class="round">N</button><button class="profile"><span class="avatar" id="avatar">B</span><span id="profileEmail">Local mode</span></button></div></div>
    <section id="dashboard" class="page active"></section>
    <section id="transactions" class="page"></section>
    <section id="goals" class="page"></section>
    <section id="analytics" class="page"></section>
    <section id="budget" class="page"></section>
  </main>
</div>
<div class="modal" id="txModal"><div class="panel"><h2 id="txModalTitle">Transaction</h2><form id="txForm" class="form-grid"><input type="hidden" id="txId"><div class="form-row"><select id="txType"><option value="gasto">Expense</option><option value="ingreso">Income</option><option value="ahorro">Saving</option></select><input id="txDate" type="date" required></div><input id="txConcept" placeholder="Payment name" required><div class="form-row"><input id="txAmount" type="number" min="0.01" step="0.01" placeholder="Amount" required><select id="txCategory"></select></div><div class="form-row"><select id="txMethod"><option>Cash</option><option>Card</option><option>Transfer</option><option>Yape</option><option>Plin</option></select><select id="txGoal"></select></div><textarea id="txNotes" placeholder="Notes"></textarea><div class="modal-actions"><button class="btn dark" type="button" data-close>Cancel</button><button class="btn" type="submit">Save</button></div></form></div></div>
<div class="modal" id="goalModal"><div class="panel"><h2>New goal</h2><form id="goalForm" class="form-grid"><input id="goalName" placeholder="Goal name" required><div class="form-row"><input id="goalTarget" type="number" min="1" step="0.01" placeholder="Target" required><input id="goalCurrent" type="number" min="0" step="0.01" placeholder="Current" value="0"></div><input id="goalDate" type="date"><div class="modal-actions"><button class="btn dark" type="button" data-close>Cancel</button><button class="btn" type="submit">Save goal</button></div></form></div></div>
<div class="modal" id="budgetModal"><div class="panel"><h2>New budget</h2><form id="budgetForm" class="form-grid"><input id="budgetName" placeholder="Budget name" required><div class="form-row"><select id="budgetCategory"></select><input id="budgetLimit" type="number" min="1" step="0.01" placeholder="Monthly limit" required></div><label class="muted"><input id="budgetGeneral" type="checkbox"> Monthly general budget</label><div class="modal-actions"><button class="btn dark" type="button" data-close>Cancel</button><button class="btn" type="submit">Save budget</button></div></form></div></div>
<div class="toast" id="toast"></div><div class="tooltip" id="tip"></div>
<script>
const SUPABASE_URL='https://rhbtzgjhlfkflqeqpcso.supabase.co';
const SUPABASE_KEY='sb_publishable_RWRWCKvm-uoEQMWQosAuAg_g4-PqU1Z';
const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const state={user:null,tx:[],cats:[],goals:[],budgets:[],page:'dashboard',selected:new Set(),editId:null,channel:null,filters:{type:'all',category:'all',from:'',to:'',q:''},period:'year'};
const supa=window.supabase?.createClient?window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}}):null;
const demoTx=[
 {id:'d1',date:'2025-01-15',type:'gasto',category:'Alimentacion',concept:'Supermercado Wong',amount:850,payment_method:'Card',expense_type:'Gasto Fijo',notes:''},
 {id:'d2',date:'2025-01-15',type:'ingreso',category:'Sueldo',concept:'Sueldo Enero',amount:3500,payment_method:'Transfer',expense_type:'',notes:''},
 {id:'d3',date:'2025-02-07',type:'gasto',category:'Combustible',concept:'Gasolina Repsol',amount:150,payment_method:'Cash',expense_type:'Gasto Variable',notes:''},
 {id:'d4',date:'2025-03-10',type:'gasto',category:'Restaurantes',concept:'Almuerzo de trabajo',amount:220,payment_method:'Card',expense_type:'Gasto Variable',notes:''},
 {id:'d5',date:'2025-04-15',type:'gasto',category:'Casino',concept:'Casino / Apuestas',amount:100,payment_method:'Cash',expense_type:'Gasto Variable',notes:''},
 {id:'d6',date:'2025-05-15',type:'ahorro',category:'',concept:'Ahorro BCP Mayo',amount:700,payment_method:'Transfer',expense_type:'',notes:''},
 {id:'d7',date:'2025-05-01',type:'ingreso',category:'Bonos',concept:'Bono trimestral',amount:1600,payment_method:'Transfer',expense_type:'',notes:''},
 {id:'d8',date:'2025-06-02',type:'gasto',category:'Alquiler',concept:'Alquiler Junio',amount:1200,payment_method:'Transfer',expense_type:'Gasto Fijo',notes:''}
];
const demoCats=['Salud','Alimentacion','Alquiler','Seguro','Combustible','Casino','Restaurantes','Reuniones','Cigarros','Fastfood','Imprevistos','Bodega','Sueldo','Bonos','Comisiones','Regalos','Crypto'];
const demoGoals=[{id:'g1',name:'MacBook Pro',target_amount:1650,current_amount:412,due_on:'2026-10-07'},{id:'g2',name:'New car',target_amount:60000,current_amount:25000,due_on:'2026-09-25'},{id:'g3',name:'New house',target_amount:150000,current_amount:5000,due_on:'2027-04-20'},{id:'g4',name:'Vacation',target_amount:3500,current_amount:2500,due_on:null}];
const demoBudgets=[{id:'b1',name:'Food & Groceries',monthly_limit:650,category_name:'Alimentacion',is_general:false},{id:'b2',name:'Cafe & Restaurants',monthly_limit:2100,category_name:'Restaurantes',is_general:false},{id:'b3',name:'Monthly budget',monthly_limit:5950,category_name:null,is_general:true},{id:'b4',name:'Traveling',monthly_limit:400,category_name:'Viajes',is_general:false}];
const $=s=>document.querySelector(s);const $$=s=>[...document.querySelectorAll(s)];
function money(v){return 'S/ '+Number(v||0).toLocaleString('es-PE',{maximumFractionDigits:0})}
function clean(v){return String(v||'').trim()}
function typeDb(t){return {gasto:'expense',ingreso:'income',ahorro:'saving'}[t]||t}
function typeUi(t){return {expense:'gasto',income:'ingreso',saving:'ahorro'}[t]||t}
function initDemo(){state.tx=JSON.parse(localStorage.bfh_tx||'null')||demoTx;state.cats=demoCats.map((name,i)=>({id:'c'+i,name,type:['Sueldo','Bonos','Comisiones','Regalos','Crypto'].includes(name)?'income':'expense'}));state.goals=JSON.parse(localStorage.bfh_goals||'null')||demoGoals;state.budgets=JSON.parse(localStorage.bfh_budgets||'null')||demoBudgets}
function toast(msg){$('#toast').textContent=msg;$('#toast').style.display='block';clearTimeout(toast.t);toast.t=setTimeout(()=>$('#toast').style.display='none',2600)}
function stats(rows=state.tx){let income=sum(rows,'ingreso'),expense=sum(rows,'gasto'),saving=sum(rows,'ahorro');return{income,expense,saving,balance:income-expense}}
function sum(rows,type){return rows.filter(x=>x.type===type).reduce((a,b)=>a+Number(b.amount||0),0)}
function rowsFiltered(){let f=state.filters;return state.tx.filter(x=>(f.type==='all'||x.type===f.type)&&(!f.category||f.category==='all'||x.category===f.category)&&(!f.from||x.date>=f.from)&&(!f.to||x.date<=f.to)&&(!f.q||`${x.concept} ${x.category} ${x.payment_method}`.toLowerCase().includes(f.q.toLowerCase())))}
function monthData(){let m=Array.from({length:12},(_,i)=>({m:i,income:0,expense:0,saving:0}));state.tx.forEach(x=>{let d=new Date(x.date+'T00:00:00');let o=m[d.getMonth()];if(x.type==='ingreso')o.income+=+x.amount;if(x.type==='gasto')o.expense+=+x.amount;if(x.type==='ahorro')o.saving+=+x.amount});return m}
function pageMeta(){return{dashboard:['Welcome back','It is the best time to manage your finances'],transactions:['Transactions','List, filter, edit and manage your movements'],goals:['Goals','Create financial goals and manage your savings'],analytics:['Analytics','Detailed overview of your financial situation'],budget:['Budget','Create and track your budgets']}[state.page]}
function nav(page){state.page=page;$$('.page').forEach(p=>p.classList.toggle('active',p.id===page));$$('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===page));let [t,s]=pageMeta();$('#pageTitle').textContent=t;$('#pageSub').textContent=s;render()}
function render(){if(!state.tx.length)initDemo();renderSelects();if(state.page==='dashboard')renderDashboard();if(state.page==='transactions')renderTransactions();if(state.page==='goals')renderGoals();if(state.page==='analytics')renderAnalytics();if(state.page==='budget')renderBudget()}
function metric(title,value,trend,kind,target){return `<article class="card metric" data-nav="${target}"><h3>${title}</h3><div class="arrow">open</div><div class="value">${value}<span style="color:var(--gray-300)">.00</span></div><span class="trend ${kind}">${trend}</span> <span class="muted">vs last month</span></article>`}
function renderDashboard(){let s=stats();$('#dashboard').innerHTML=`<div class="toolbar"><button class="chip">This month</button><button class="btn" onclick="openTx()">+ Add transaction</button></div><div class="grid-4">${metric('Total balance',money(s.balance),'up 12.1%','pos','analytics')}${metric('Income',money(s.income),'up 6.3%','pos','transactions')}${metric('Expense',money(s.expense),'up 2.4%','neg','transactions')}${metric('Total savings',money(s.saving),'up 12.1%','pos','goals')}</div><div style="height:16px"></div><div class="grid-2"><article class="card"><div class="section-head"><h3>Money flow</h3><div class="legend"><span><i class="dot green"></i>Income</span><span><i class="dot"></i>Expense</span></div></div>${barChart(monthData(),'analytics')}</article><article class="card"><div class="section-head"><h3>Budget</h3><button class="round" onclick="nav('budget')">open</button></div>${budgetDonut()}</article></div><div style="height:16px"></div><div class="grid-2"><article class="card"><div class="section-head"><h3>Recent transactions</h3><button class="btn dark" onclick="nav('transactions')">See all</button></div>${txTable(state.tx.slice(0,5),false)}</article><article class="card"><div class="section-head"><h3>Saving goals</h3><button class="round" onclick="nav('goals')">open</button></div>${goalsMini()}</article></div>`;bindInteractive()}
function barChart(data,target){let max=Math.max(...data.flatMap(x=>[x.income,x.expense]),1);return `<div class="bar-chart">${data.slice(0,7).map(x=>`<div class="bar-month" data-nav="${target}" data-tip="${months[x.m]} Income ${money(x.income)} / Expense ${money(x.expense)}"><div class="bar income" style="height:${x.income/max*100}%"></div><div class="bar expense" style="height:${x.expense/max*100}%"></div><span class="muted" style="position:absolute;bottom:-24px">${months[x.m]}</span></div>`).join('')}</div>`}
function budgetDonut(){let total=state.budgets.find(b=>b.is_general)?.monthly_limit||5950;let spent=sum(state.tx,'gasto');let pct=Math.min(100,Math.round(spent/total*100));let cats=Object.entries(groupExpense()).slice(0,5);return `<div class="donut-wrap"><div class="donut" style="background:conic-gradient(var(--gray-200) 0 ${pct*3.6}deg,var(--gray-700) ${pct*3.6}deg 360deg)" data-nav="budget" data-tip="${pct}% spent"><div class="donut-inner"><span class="muted">Total for month</span><strong>${money(total)}</strong></div></div><div class="mini-list">${cats.map(([k])=>`<span class="muted"><i class="dot"></i>${k}</span>`).join('')}</div></div>`}
function goalsMini(){return `<div class="goal-list">${state.goals.slice(0,3).map(g=>{let p=Math.round((+g.current_amount||0)/(+g.target_amount||1)*100);return `<div><div style="display:flex;justify-content:space-between"><strong>${g.name}</strong><span class="muted">${money(g.target_amount)}</span></div><div class="progress"><i style="width:${Math.min(100,p)}%"></i></div></div>`}).join('')}</div>`}
function groupExpense(){return state.tx.filter(x=>x.type==='gasto').reduce((a,b)=>{a[b.category||'Other']=(a[b.category||'Other']||0)+Number(b.amount);return a},{})}
function txTable(rows,selectable=true){return `<div class="table-wrap"><table><thead><tr>${selectable?'<th><input type="checkbox" id="checkAll"></th>':''}<th>Date</th><th>Amount</th><th>Payment name</th><th>Method</th><th>Category</th><th></th></tr></thead><tbody>${rows.map(x=>`<tr>${selectable?`<td><input type="checkbox" class="rowCheck" value="${x.id}" ${state.selected.has(x.id)?'checked':''}></td>`:''}<td>${x.date}</td><td class="amount ${x.type==='gasto'?'neg':'pos'}">${x.type==='gasto'?'-':'+'}${money(x.amount)}</td><td><strong>${x.concept}</strong><br><span class="muted">${x.notes||''}</span></td><td>${x.payment_method||'-'}</td><td>${x.category||'-'}</td><td><button class="btn dark" onclick="editTx('${x.id}')">Edit</button> <button class="btn danger" onclick="deleteTx('${x.id}')">Delete</button></td></tr>`).join('')}</tbody></table></div>`}
function renderTransactions(){let rows=rowsFiltered();$('#transactions').innerHTML=`<div class="toolbar"><button class="btn" onclick="openTx()">+ Add transaction</button><button class="btn danger" onclick="deleteSelected()">Delete selected</button><select class="field" id="fType"><option value="all">All types</option><option value="ingreso">Income</option><option value="gasto">Expense</option><option value="ahorro">Saving</option></select><select class="field" id="fCat"><option value="all">All categories</option>${[...new Set(state.tx.map(x=>x.category).filter(Boolean))].map(c=>`<option>${c}</option>`).join('')}</select><input class="field" id="fQ" placeholder="Search"><input class="field" id="fFrom" type="date"><input class="field" id="fTo" type="date"></div><article class="card">${txTable(rows,true)}</article>`;['fType','fCat','fQ','fFrom','fTo'].forEach(id=>{let el=$('#'+id);if(el){el.value=state.filters[{fType:'type',fCat:'category',fQ:'q',fFrom:'from',fTo:'to'}[id]]||el.value;el.oninput=()=>{state.filters.type=$('#fType').value;state.filters.category=$('#fCat').value;state.filters.q=$('#fQ').value;state.filters.from=$('#fFrom').value;state.filters.to=$('#fTo').value;renderTransactions()}}});$$('.rowCheck').forEach(c=>c.onchange=e=>{e.target.checked?state.selected.add(e.target.value):state.selected.delete(e.target.value)});let all=$('#checkAll');if(all)all.onchange=e=>{$$('.rowCheck').forEach(c=>{c.checked=e.target.checked;e.target.checked?state.selected.add(c.value):state.selected.delete(c.value)})}}
function renderGoals(){let savingByGoal={};state.tx.filter(x=>x.type==='ahorro'&&x.goal_id).forEach(x=>savingByGoal[x.goal_id]=(savingByGoal[x.goal_id]||0)+Number(x.amount));$('#goals').innerHTML=`<div class="toolbar"><button class="chip">This year</button><button class="chip">Sort by: Name A-Z</button><button class="btn" onclick="openGoal()">+ Add new goal</button></div><div class="goal-grid">${state.goals.map(g=>goalCard(g,savingByGoal[g.id]||0)).join('')}</div><div style="height:16px"></div><div class="split"><article class="card"><h3>Total goals</h3><div class="big">${state.goals.length}</div><div class="status-grid"><div class="status"><span>Not started</span><strong>${state.goals.filter(g=>!+g.current_amount).length}</strong></div><div class="status"><span>In progress</span><strong>${state.goals.filter(g=>+g.current_amount>0&&+g.current_amount<+g.target_amount).length}</strong></div><div class="status"><span>Finished</span><strong>${state.goals.filter(g=>+g.current_amount>=+g.target_amount).length}</strong></div><div class="status"><span>Linked savings</span><strong>${Object.keys(savingByGoal).length}</strong></div></div></article><article class="card"><h3>Savings overview</h3>${areaChart(monthData().map(x=>x.saving),'goals')}</article></div>`}
function goalCard(g,linked){let current=Number(g.current_amount||0)+linked,p=Math.min(100,Math.round(current/Number(g.target_amount||1)*100));return `<article class="goal-card"><div class="section-head"><div><h3>${g.name}</h3><span class="muted">Due date - ${g.due_on||'No due date'}</span></div><button class="round" onclick="openTx('ahorro','${g.id}')">save</button></div><div class="big">${money(current)}<span class="muted">/${money(g.target_amount)}</span></div><div class="progress"><i style="width:${p}%"></i></div><div style="display:flex;justify-content:space-between;margin-top:8px"><span class="pill ok">${p}%</span><span class="muted">Left ${money(Math.max(0,g.target_amount-current))}</span></div></article>`}
function areaChart(values,target){let max=Math.max(...values,1),pts=values.map((v,i)=>`${i*60},${150-v/max*120}`).join(' ');return `<svg viewBox="0 0 680 180" class="chart" data-nav="${target}"><defs><linearGradient id="fill" x1="0" y1="0" y2="1"><stop stop-color="#D0D0D4" stop-opacity=".5"/><stop offset="1" stop-color="#D0D0D4" stop-opacity="0"/></linearGradient></defs><polyline points="${pts}" fill="none" stroke="#D0D0D4" stroke-width="4" stroke-linecap="round"/><polygon points="0,170 ${pts} 660,170" fill="url(#fill)"/></svg>`}
function renderAnalytics(){let r=rowsFiltered(),s=stats(r);$('#analytics').innerHTML=`<div class="toolbar"><select class="field" id="aType"><option value="all">All</option><option value="gasto">Expense</option><option value="ingreso">Income</option><option value="ahorro">Saving</option></select><input class="field" id="aFrom" type="date"><input class="field" id="aTo" type="date"><button class="btn dark" onclick="exportCsv()">Export CSV</button></div><div class="grid-4">${metric('Total balance',money(s.balance),'â†‘ 12.1%','pos','transactions')}${metric('Income',money(s.income),'â†‘ 6.3%','pos','transactions')}${metric('Expense',money(s.expense),'â†‘ 2.4%','neg','budget')}<article class="card metric"><h3>Transactions</h3><div class="value">${r.length}</div><span class="muted">filtered movements</span></article></div><div style="height:16px"></div><div class="grid-2"><article class="card"><h3>Total balance overview</h3>${areaChart(monthData().map(x=>x.income-x.expense),'analytics')}</article><article class="card"><h3>Statistics</h3>${budgetDonut()}</article></div><div style="height:16px"></div><article class="card"><h3>Comparing of budget and expense</h3>${barChart(monthData(),'budget')}</article>`;['aType','aFrom','aTo'].forEach(id=>{let el=$('#'+id);el.oninput=()=>{state.filters.type=$('#aType').value;state.filters.from=$('#aFrom').value;state.filters.to=$('#aTo').value;renderAnalytics()}});bindInteractive()}
function renderBudget(){let spent=groupExpense(),general=state.budgets.find(b=>b.is_general),totalSpent=sum(state.tx,'gasto'),totalLimit=general?.monthly_limit||5950;$('#budget').innerHTML=`<div class="toolbar"><button class="btn" onclick="openBudget()">+ Add new budget</button><button class="chip">This month</button><button class="chip">Sort by: Default</button></div><div class="budget-layout"><div class="budget-grid">${state.budgets.filter(b=>!b.is_general).map(b=>budgetCard(b,spent[b.category_name||b.name]||0)).join('')}</div><div class="grid"><article class="card"><h3>Monthly budget</h3><div class="big">${money(totalLimit)}</div><span class="${totalSpent<=totalLimit?'pill ok':'pill bad'}">${totalSpent<=totalLimit?'On track':'Over limit'}</span><div class="donut" style="margin:20px auto;background:conic-gradient(var(--gray-200) 0 ${Math.min(100,totalSpent/totalLimit*100)*3.6}deg,var(--gray-700) 0 360deg)"><div class="donut-inner"><span class="muted">Spent</span><strong>${money(totalSpent)}</strong></div></div></article><article class="card"><h3>Most expenses</h3><div class="mini-list">${Object.entries(spent).sort((a,b)=>b[1]-a[1]).slice(0,7).map(([k,v])=>`<div class="mini-row"><span>${k}<br><small class="muted">${money(v)}</small></span><span class="pill ${v>700?'bad':'ok'}">${v>700?'high':'ok'}</span></div>`).join('')}</div></article></div></div>`}
function budgetCard(b,spent){let rawPct=Math.round(spent/b.monthly_limit*100),pct=Math.min(100,rawPct),left=Math.max(0,b.monthly_limit-spent),cls=rawPct>100?'bad':rawPct>80?'warn':'ok';return `<article class="budget-card"><div class="section-head"><h3>${b.name}</h3><button class="round" onclick="openBudget('${b.id}')">edit</button></div><div class="donut" style="width:116px;height:116px;background:conic-gradient(var(--gray-200) 0 ${pct*3.6}deg,var(--gray-700) 0 360deg)"><div class="donut-inner" style="width:74px;height:74px"><small>${rawPct}% spent</small><strong>${money(spent)}</strong></div></div><p class="muted">Left</p><div class="big">${money(left)}<span class="muted">/${money(b.monthly_limit)}</span></div><span class="pill ${cls}">${cls==='ok'?'On track':cls==='warn'?'Need attention':'Over limit'}</span></article>`}
function renderSelects(){let opts=state.cats.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');$('#txCategory').innerHTML='<option value="">No category</option>'+opts;$('#budgetCategory').innerHTML='<option value="">General</option>'+opts;$('#txGoal').innerHTML='<option value="">No goal</option>'+state.goals.map(g=>`<option value="${g.id}">${g.name}</option>`).join('')}
function openTx(type='gasto',goal=''){state.editId=null;$('#txForm').reset();$('#txId').value='';$('#txType').value=type;$('#txDate').value=new Date().toISOString().slice(0,10);$('#txGoal').value=goal;$('#txModal').classList.add('open')}
function editTx(id){let x=state.tx.find(t=>t.id===id);if(!x)return;state.editId=id;$('#txId').value=id;$('#txType').value=x.type;$('#txDate').value=x.date;$('#txConcept').value=x.concept;$('#txAmount').value=x.amount;$('#txCategory').value=x.category||'';$('#txMethod').value=x.payment_method||'';$('#txGoal').value=x.goal_id||'';$('#txNotes').value=x.notes||'';$('#txModal').classList.add('open')}
function openGoal(){$('#goalForm').reset();$('#goalModal').classList.add('open')}
function openBudget(){$('#budgetForm').reset();$('#budgetModal').classList.add('open')}
async function saveTx(e){e.preventDefault();let rec={id:state.editId||'local_'+Date.now(),date:$('#txDate').value,type:$('#txType').value,concept:clean($('#txConcept').value),amount:Number($('#txAmount').value),category:$('#txCategory').value,payment_method:$('#txMethod').value,goal_id:$('#txGoal').value||null,notes:clean($('#txNotes').value)};if(supa&&state.user){let cat=state.cats.find(c=>c.name===rec.category);let payload={user_id:state.user.id,type:typeDb(rec.type),title:rec.concept,amount:rec.amount,occurred_on:rec.date,payment_method:rec.payment_method,note:rec.notes,goal_id:rec.goal_id||null,category_id:cat?.id||null};let q=state.editId?supa.from('transactions').update(payload).eq('id',state.editId):supa.from('transactions').insert([payload]);let {error}=await q;if(error)return toast(error.message)}else{state.tx=state.tx.filter(x=>x.id!==rec.id);state.tx.unshift(rec);localStorage.bfh_tx=JSON.stringify(state.tx)}$('#txModal').classList.remove('open');await loadData();toast('Transaction saved')}
async function saveGoal(e){e.preventDefault();let g={id:'local_goal_'+Date.now(),name:clean($('#goalName').value),target_amount:Number($('#goalTarget').value),current_amount:Number($('#goalCurrent').value||0),due_on:$('#goalDate').value||null};if(supa&&state.user){let {error}=await supa.from('goals').insert([{...g,user_id:state.user.id}]);if(error)return toast(error.message)}else{state.goals.unshift(g);localStorage.bfh_goals=JSON.stringify(state.goals)}$('#goalModal').classList.remove('open');await loadData();toast('Goal saved')}
async function saveBudget(e){e.preventDefault();let name=clean($('#budgetName').value),cat=$('#budgetCategory').value,gen=$('#budgetGeneral').checked,b={id:'local_budget_'+Date.now(),name,category_name:cat||null,monthly_limit:Number($('#budgetLimit').value),is_general:gen};if(supa&&state.user){let c=state.cats.find(x=>x.name===cat);let {error}=await supa.from('budgets').insert([{user_id:state.user.id,name,category_id:c?.id||null,monthly_limit:b.monthly_limit,is_general:gen}]);if(error)return toast(error.message)}else{state.budgets.unshift(b);localStorage.bfh_budgets=JSON.stringify(state.budgets)}$('#budgetModal').classList.remove('open');await loadData();toast('Budget saved')}
async function deleteTx(id){if(!confirm('Delete transaction?'))return;if(supa&&state.user&&!id.startsWith('d')&&!id.startsWith('local_'))await supa.from('transactions').delete().eq('id',id);state.tx=state.tx.filter(x=>x.id!==id);localStorage.bfh_tx=JSON.stringify(state.tx);render();toast('Deleted')}
function deleteSelected(){[...state.selected].forEach(id=>deleteTx(id));state.selected.clear()}
function exportCsv(){let csv='date,type,concept,amount,category\\n'+rowsFiltered().map(x=>[x.date,x.type,x.concept,x.amount,x.category].join(',')).join('\\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='transactions.csv';a.click()}
function bindInteractive(){$$('[data-nav]').forEach(el=>{el.onclick=()=>nav(el.dataset.nav);el.onmousemove=e=>showTip(e,el.dataset.tip||'Open '+el.dataset.nav);el.onmouseleave=hideTip})}
function showTip(e,t){let tip=$('#tip');tip.textContent=t;tip.style.left=e.clientX+14+'px';tip.style.top=e.clientY+14+'px';tip.style.display='block'}function hideTip(){$('#tip').style.display='none'}
async function loadData(){if(!supa||!state.user){initDemo();render();return}let [tx,cats,goals,budgets]=await Promise.all([supa.from('transactions').select('*,categories(name)').order('occurred_on',{ascending:false}),supa.from('categories').select('*').order('name'),supa.from('goals').select('*').order('created_at',{ascending:false}),supa.from('budgets').select('*,categories(name)').order('created_at',{ascending:false})]);if(tx.error)return toast(tx.error.message);state.tx=(tx.data||[]).map(x=>({id:x.id,date:x.occurred_on,type:typeUi(x.type),concept:x.title,amount:+x.amount,category:x.categories?.name||'',payment_method:x.payment_method,notes:x.note||'',goal_id:x.goal_id}));state.cats=cats.data||[];state.goals=goals.data||[];state.budgets=(budgets.data||[]).map(b=>({...b,category_name:b.categories?.name||null}));render()}
function subscribe(){if(!supa||!state.user)return;if(state.channel)supa.removeChannel(state.channel);state.channel=supa.channel('bfh-'+state.user.id).on('postgres_changes',{event:'*',schema:'public',table:'transactions',filter:`user_id=eq.${state.user.id}`},loadData).on('postgres_changes',{event:'*',schema:'public',table:'goals',filter:`user_id=eq.${state.user.id}`},loadData).on('postgres_changes',{event:'*',schema:'public',table:'budgets',filter:`user_id=eq.${state.user.id}`},loadData).on('postgres_changes',{event:'*',schema:'public',table:'categories'},loadData).subscribe(s=>$('#syncState').textContent=s==='SUBSCRIBED'?'Realtime active':'Realtime sync')}
async function setSession(session){state.user=session?.user||null;$('#authGate').classList.toggle('open',!!supa&&!state.user);$('#profileEmail').textContent=state.user?.email||'Local mode';if(state.user){await loadData();subscribe()}else{initDemo();render()}}
async function signIn(e){e.preventDefault();$('#authStatus').textContent='Entering...';let {error}=await supa.auth.signInWithPassword({email:$('#authEmail').value,password:$('#authPassword').value});$('#authStatus').textContent=error?error.message:'Session started'}
async function signUp(){let {error}=await supa.auth.signUp({email:$('#authEmail').value,password:$('#authPassword').value,options:{emailRedirectTo:location.href}});$('#authStatus').textContent=error?error.message:'Account created. Check your email if confirmation is required.'}
window.nav=nav;window.openTx=openTx;window.editTx=editTx;window.deleteTx=deleteTx;window.deleteSelected=deleteSelected;window.openGoal=openGoal;window.openBudget=openBudget;window.exportCsv=exportCsv;
$$('.nav button').forEach(b=>b.onclick=()=>nav(b.dataset.page));$$('[data-close]').forEach(b=>b.onclick=()=>b.closest('.modal').classList.remove('open'));$$('.modal').forEach(m=>m.onclick=e=>{if(e.target===m)m.classList.remove('open')});$('#txForm').onsubmit=saveTx;$('#goalForm').onsubmit=saveGoal;$('#budgetForm').onsubmit=saveBudget;$('#authForm').onsubmit=signIn;$('#signupBtn').onclick=signUp;$('#logoutBtn').onclick=()=>supa?supa.auth.signOut():toast('Local mode');
if(supa){supa.auth.getSession().then(({data})=>setSession(data.session));supa.auth.onAuthStateChange((_e,s)=>setSession(s))}else setSession(null);
</script>
</body>
</html>
